<main class="min-h-screen bg-[#101312] text-[#f4f6f2]">
  <div class="mx-auto flex min-h-screen w-full max-w-[1500px]">
    <aside class="sticky top-0 hidden h-screen w-64 shrink-0 border-r border-white/8 bg-[#151817] p-5 lg:flex lg:flex-col">
      <a class="mb-9 flex items-center gap-3" routerLink="/">
        <span class="grid size-10 place-items-center rounded-lg bg-[#dcefe5] text-lg font-semibold text-[#17352d]">T</span>
        <span class="text-lg font-semibold">TTK Services</span>
      </a>
      <nav class="grid gap-2 text-sm text-white/66">
        <a class="flex items-center gap-3 rounded-md px-3 py-2.5 hover:bg-white/8 hover:text-white" routerLink="/" routerLinkActive="bg-white/10 text-white" [routerLinkActiveOptions]="{ exact: true }"><lucide-icon name="home" [size]="17" />Accueil</a>
        <a class="flex items-center gap-3 rounded-md px-3 py-2.5 hover:bg-white/8 hover:text-white" routerLink="/services" routerLinkActive="bg-white/10 text-white"><lucide-icon name="layers-3" [size]="17" />Services</a>
        <a class="flex items-center gap-3 rounded-md px-3 py-2.5 hover:bg-white/8 hover:text-white" routerLink="/login" routerLinkActive="bg-white/10 text-white"><lucide-icon name="user-round" [size]="17" />Compte</a>
      </nav>
      <div class="mt-auto rounded-xl bg-[#101312] p-4 text-xs leading-6 text-white/55">
        <strong class="mb-2 block text-sm font-semibold text-white">Support humain</strong>
        Commandes, demandes et justificatifs restent suivis par l'équipe TTK.
      </div>
    </aside>

    <section class="min-w-0 flex-1">
      <header class="sticky top-0 z-30 flex items-center justify-between border-b border-white/8 bg-[#101312]/86 px-4 py-3 backdrop-blur md:px-7 lg:hidden">
        <a class="flex items-center gap-2 font-semibold" routerLink="/"><span class="grid size-9 place-items-center rounded-lg bg-[#dcefe5] text-[#17352d]">T</span>TTK</a>
        <nav class="flex items-center gap-1 text-sm text-white/70">
          <a class="rounded-md px-3 py-2" routerLink="/services">Services</a>
          <a class="rounded-md bg-white px-3 py-2 text-[#101312]" routerLink="/login">Connexion</a>
        </nav>
      </header>
      <router-outlet />
    </section>
  </div>
</main>
