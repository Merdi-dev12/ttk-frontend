<section class="grid min-h-[calc(100vh-65px)] place-items-center px-4 py-8">
  <form class="w-full max-w-md rounded-2xl border border-white/10 bg-white/6 p-6" (ngSubmit)="submit()">
    <a class="mb-8 inline-flex items-center gap-2 text-sm text-white/55" routerLink="/"><lucide-icon name="arrow-left" [size]="17" />Accueil</a>
    <h1 class="text-3xl font-semibold">Connexion</h1>
    <p class="mt-2 text-sm text-white/58">Retrouvez vos commandes, demandes et factures.</p>
    @if (message()) { <div class="mt-5 rounded-xl bg-white/8 p-3 text-sm text-white/72">{{ message() }}</div> }
    <label class="mt-6 grid gap-2 text-sm text-white/72">Email<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" type="email" autocomplete="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" /></label>
    <label class="mt-4 grid gap-2 text-sm text-white/72">Mot de passe<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" type="password" autocomplete="current-password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" /></label>
    <button class="mt-6 flex min-h-12 w-full items-center justify-center gap-2 rounded-full bg-white text-sm text-[#101312]" [disabled]="loading()" type="submit">
      {{ loading() ? 'Connexion...' : 'Se connecter' }} <lucide-icon name="arrow-right" [size]="17" />
    </button>
    <p class="mt-5 text-center text-sm text-white/55">Pas encore de compte ? <a class="text-white" routerLink="/register">Créer un compte</a></p>
  </form>
</section>
