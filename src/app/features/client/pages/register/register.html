<section class="grid min-h-[calc(100vh-65px)] place-items-center px-4 py-8">
  <form class="w-full max-w-2xl rounded-2xl border border-white/10 bg-white/6 p-6" (ngSubmit)="submit()">
    <a class="mb-8 inline-flex items-center gap-2 text-sm text-white/55" routerLink="/"><lucide-icon name="arrow-left" [size]="17" />Accueil</a>
    <h1 class="text-3xl font-semibold">Créer un compte</h1>
    <p class="mt-2 text-sm text-white/58">Un compte client permet de suivre vos commandes et vos demandes.</p>
    @if (message()) { <div class="mt-5 rounded-xl bg-white/8 p-3 text-sm text-white/72">{{ message() }}</div> }
    <div class="mt-6 grid gap-4 md:grid-cols-2">
      <label class="grid gap-2 text-sm text-white/72">Nom<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" [ngModel]="nom()" (ngModelChange)="nom.set($event)" name="nom" /></label>
      <label class="grid gap-2 text-sm text-white/72">Postnom<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" [ngModel]="postnom()" (ngModelChange)="postnom.set($event)" name="postnom" /></label>
      <label class="grid gap-2 text-sm text-white/72">Email<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" /></label>
      <label class="grid gap-2 text-sm text-white/72">Téléphone<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" [ngModel]="telephone()" (ngModelChange)="telephone.set($event)" name="telephone" /></label>
      <label class="grid gap-2 text-sm text-white/72 md:col-span-2">Mot de passe<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" /></label>
    </div>
    <button class="mt-6 flex min-h-12 w-full items-center justify-center gap-2 rounded-full bg-white text-sm text-[#101312]" [disabled]="loading()" type="submit">
      {{ loading() ? 'Création...' : 'Continuer' }} <lucide-icon name="arrow-right" [size]="17" />
    </button>
    <p class="mt-5 text-center text-sm text-white/55">Déjà inscrit ? <a class="text-white" routerLink="/login">Se connecter</a></p>
  </form>
</section>
