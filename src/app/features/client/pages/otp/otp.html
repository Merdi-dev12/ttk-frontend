<section class="grid min-h-[calc(100vh-65px)] place-items-center px-4 py-8">
  <form class="w-full max-w-md rounded-2xl border border-white/10 bg-white/6 p-6" (ngSubmit)="submit()">
    <a class="mb-8 inline-flex items-center gap-2 text-sm text-white/55" routerLink="/register"><lucide-icon name="arrow-left" [size]="17" />Inscription</a>
    <h1 class="text-3xl font-semibold">Vérification OTP</h1>
    <p class="mt-2 text-sm text-white/58">Entrez le code envoyé à votre adresse email pour activer votre compte.</p>
    @if (message()) { <div class="mt-5 rounded-xl bg-white/8 p-3 text-sm text-white/72">{{ message() }}</div> }
    <label class="mt-6 grid gap-2 text-sm text-white/72">Email<input class="min-h-12 rounded-xl border border-white/10 bg-[#101312] px-4 text-white outline-none focus:border-white/35" type="email" [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" /></label>
    <label class="mt-4 grid gap-2 text-sm text-white/72">Code OTP<input class="min-h-14 rounded-xl border border-white/10 bg-[#101312] px-4 text-center text-2xl tracking-[.45em] text-white outline-none focus:border-white/35" maxlength="8" [ngModel]="code()" (ngModelChange)="code.set($event)" name="code" /></label>
    <button class="mt-6 flex min-h-12 w-full items-center justify-center gap-2 rounded-full bg-white text-sm text-[#101312]" [disabled]="loading()" type="submit">
      {{ loading() ? 'Vérification...' : 'Vérifier le compte' }} <lucide-icon name="check" [size]="17" />
    </button>
    <p class="mt-5 text-center text-sm text-white/55">Déjà vérifié ? <a class="text-white" routerLink="/login">Connexion</a></p>
  </form>
</section>
