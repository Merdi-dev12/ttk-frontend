<button class="fixed inset-0 z-[130] border-0 bg-black/45 backdrop-blur-[2px]" type="button" aria-label="Annuler" [disabled]="loading()" (click)="cancel.emit()"></button>

<section class="fixed left-1/2 top-1/2 z-[140] w-[min(430px,calc(100vw-28px))] -translate-x-1/2 -translate-y-1/2 rounded-lg border border-[var(--border)] bg-[var(--surface)] p-5 text-[var(--text)] shadow-[var(--shadow)]" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
  <header class="mb-4 flex items-start gap-3">
    <span class="grid h-11 w-11 shrink-0 place-items-center rounded-lg bg-[var(--coral)] text-[var(--coral-strong)]">
      <lucide-icon name="trash-2" [size]="22"></lucide-icon>
    </span>
    <div class="min-w-0 flex-1">
      <span class="mb-1 block text-xs! font-medium uppercase tracking-normal text-[var(--coral-strong)]">Confirmation</span>
      <h2 id="confirm-title" class="m-0 text-lg! font-semibold text-[var(--text)]">{{ title() }}</h2>
    </div>
    <button class="grid h-9 w-9 shrink-0 place-items-center rounded-md border border-[var(--border)] bg-[var(--surface)] text-[var(--muted)] hover:bg-[var(--surface-hover)]" type="button" aria-label="Fermer" [disabled]="loading()" (click)="cancel.emit()">
      <lucide-icon name="x" [size]="18"></lucide-icon>
    </button>
  </header>

  <p class="m-0 text-sm! leading-6 text-[var(--muted)]">{{ message() }}</p>
  @if (details()) {
    <p class="mt-3 rounded-md border border-[var(--border)] bg-[var(--surface-soft)] px-3 py-2 text-sm! leading-5 text-[var(--text)]">{{ details() }}</p>
  }

  <footer class="mt-5 flex flex-col-reverse gap-2 sm:flex-row sm:justify-end">
    <button class="min-h-10 rounded-md border border-[var(--border)] bg-[var(--surface)] px-4 text-sm! font-medium text-[var(--text)] hover:bg-[var(--surface-hover)]" type="button" [disabled]="loading()" (click)="cancel.emit()">{{ cancelLabel() }}</button>
    <button class="inline-flex min-h-10 items-center justify-center gap-2 rounded-md border border-[var(--coral-strong)] bg-[var(--coral)] px-4 text-sm! font-medium text-[var(--coral-strong)] hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60" type="button" [disabled]="loading()" (click)="confirm.emit()">
      <lucide-icon [name]="loading() ? 'loader-circle' : 'trash-2'" [class.animate-spin]="loading()" [size]="17"></lucide-icon>
      {{ loading() ? 'Suppression...' : confirmLabel() }}
    </button>
  </footer>
</section>
