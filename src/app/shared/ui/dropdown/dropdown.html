<div class="relative w-full">
  <button
    class="flex min-h-10 w-full items-center justify-between gap-3 rounded-md border border-[var(--border)] bg-[var(--surface)] px-3 text-left text-sm font-normal text-[var(--text)] outline-none transition focus:border-[var(--primary)] focus:ring-3 focus:ring-[color-mix(in_srgb,var(--primary)_12%,transparent)] disabled:cursor-not-allowed disabled:opacity-55"
    type="button"
    [disabled]="disabled()"
    [attr.aria-label]="ariaLabel()"
    [attr.aria-expanded]="open()"
    aria-haspopup="listbox"
    (click)="toggle()"
  >
    <span class="min-w-0 truncate" [class.text-[var(--muted)]]="!selectedLabel()">
      {{ selectedLabel() || placeholder() }}
    </span>
    <lucide-icon
      class="shrink-0 text-[var(--muted)] transition-transform duration-200"
      [class.rotate-180]="open()"
      name="chevron-down"
      [size]="17"
    />
  </button>

  @if (open()) {
    <div
      class="absolute z-50 mt-1 max-h-56 w-full overflow-y-auto rounded-md border border-[var(--border)] bg-[var(--surface)] p-1 shadow-xl"
      role="listbox"
    >
      @for (option of options(); track option.value) {
        <button
          class="flex min-h-9 w-full items-center rounded-sm px-3 text-left text-sm font-normal text-[var(--text)] transition hover:bg-[var(--surface-soft)] disabled:cursor-not-allowed disabled:opacity-45"
          type="button"
          role="option"
          [disabled]="option.disabled"
          [attr.aria-selected]="option.value === value()"
          [class.bg-[var(--surface-soft)]]="option.value === value()"
          (click)="choose(option)"
        >
          <span class="truncate">{{ option.label }}</span>
        </button>
      }
    </div>
  }
</div>
